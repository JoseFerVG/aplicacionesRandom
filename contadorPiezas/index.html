<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushímetro Pop-Art</title>
    <!-- Tipografía gruesa y brutalista -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Contador Pop-Art multi-piezas para buffet libre de sushi.">
</head>
<body>
    <header class="sticky-header">
        <div class="header-content">
            <h1 class="title">BUNKER SUSHI</h1>
            <div class="total-tracker">
                <span class="total-label">TOTAL:</span>
                <output id="total-counter" aria-live="polite">0</output>
            </div>
            <div class="header-actions">
                <button id="btn-save-image" class="btn-reset btn-save" aria-label="Guardar imagen resumen">📸 IMAGEN</button>
                <button id="btn-reset-all" class="btn-reset" aria-label="Reiniciar todos los contadores">RESET</button>
            </div>
        </div>
    </header>

    <main>
        <section id="menu-grid" class="menu-grid">
            <!-- Las tarjetas de cada pieza se inyectarán aquí dinámicamente mediante app.js -->
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
